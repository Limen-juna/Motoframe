name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract ZIP
        run: unzip motoframe.zip -d project

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create .env file
        run: echo "GEMINI_API_KEY=placeholder" > project/.env

      - name: Remove debug signing config
        run: |
          cd project
          sed -i 's/signingConfig = signingConfigs.getByName("debugConfig")//g' app/build.gradle.kts

      - name: Make gradlew executable
        run: |
          cd project
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd project
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: motoframe-debug
          path: project/app/build/outputs/apk/debug/*.apk
