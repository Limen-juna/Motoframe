name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: unzip motoframe.zip -d project

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Create .env file
        run: echo "GEMINI_API_KEY=placeholder" > project/.env

      - name: Remove debug signing config
        run: |
          sed -i 's/signingConfig = signingConfigs.getByName("debugConfig")//g' project/app/build.gradle.kts

      - name: Build Debug APK
        run: |
          cd project
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: motoframe-debug
          path: project/app/build/outputs/apk/debug/*.apk
